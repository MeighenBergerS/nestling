default: true

# Line length: allow longer lines in tables and code blocks
MD013:
  line_length: 150
  code_blocks: false
  tables: false

# Allow inline HTML (used by MkDocs admonitions and special blocks)
MD033: false

# First line must be a top-level heading
MD041: true

# Allow duplicate headings in different sections
MD024:
  siblings_only: true
