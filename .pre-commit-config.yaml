repos:
  - repo: local
    hooks:
      - id: llm-coauthor-notice
        name: LLM co-author notice
        language: python
        entry: python .hooks/llm_coauthor_notice.py
        stages: [commit-msg]
        always_run: true
        verbose: true

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.0
    hooks:
      - id: markdownlint-cli2
