name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MPLBACKEND: Agg

jobs:
  quality:
    name: Lint (ruff + markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    name: Tests (pytest + nbmake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Install coding-track example package
        # Installs neutrino_flux and its dependencies (numpy, scipy) so that
        # notebook 01 and the package tests can be collected without errors.
        # Notebook 02 (numba) and 03 (torch) are excluded below — those
        # dependencies are too large for CI.
        run: |
          pip install -e examples/coding/neutrino_flux/
          pip install matplotlib pandas h5py
      - name: Run unit tests
        run: pytest tests/ -m "not network"
      - name: Test notebooks
        run: |
          notebooks=$(find examples -name "*.ipynb" | head -1)
          if [ -n "$notebooks" ]; then
            pytest --nbmake examples/ \
              --ignore=examples/arxiv/notebooks \
              --ignore=examples/coding/neutrino_flux \
              --ignore=examples/coding/notebooks/02_performance.ipynb \
              --ignore=examples/coding/notebooks/03_ml_basics.ipynb
          else
            echo "No notebooks found — skipping nbmake."
          fi

  docs:
    name: Docs build (mkdocs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Build documentation
        run: mkdocs build --strict
