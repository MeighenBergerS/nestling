name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MPLBACKEND: Agg

jobs:
  quality:
    name: Lint (ruff + markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - uses: pre-commit/action@v3.0.1

  test:
    name: Tests (pytest + nbmake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/
      - name: Test notebooks
        run: pytest --nbmake examples/

  docs:
    name: Docs build (mkdocs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Build documentation
        run: mkdocs build --strict
