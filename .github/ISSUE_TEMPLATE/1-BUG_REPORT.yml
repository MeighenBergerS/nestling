name: Bug report
description: Report a broken example, script, or notebook
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: contact
    attributes:
      label: Contact details
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        - In this environment...
        - With this config...
        - Run '...'
        - See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >
        Copy and paste any relevant log output.
        This will be automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: >
        Anything that gives us more context: links, references, files, etc.
    validations:
      required: false
