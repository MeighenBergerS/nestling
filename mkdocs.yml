site_name: Nestling
site_description: A beginner-friendly, physics-first learning repository for early-career researchers.
repo_url: https://github.com/MeighenBergerS/nestling
site_author: Stephan Meighen-Berger
copyright: © Nestling Contributors

theme:
  name: readthedocs
  logo: img/logo.png
  favicon: img/favicon.ico

nav:
  - Home: index.md
  - Getting Started:
    - How to Use This Repo: getting-started/how-to-use-this-repo.md
    - Environment Setup: getting-started/environment-setup.md
  - Tracks:
    - ArXiv & Reading Papers:
      - Overview: tracks/01-arxiv/index.md
      - Lesson 01 — Finding Papers: tracks/01-arxiv/lesson-01.md
      - Lesson 02 — Reading Strategy: tracks/01-arxiv/lesson-02.md
      - Lesson 03 — Managing Papers: tracks/01-arxiv/lesson-03.md
    - Journal Club:
      - Overview: tracks/02-journal-club/index.md
      - Lesson 01 — How to Present a Paper: tracks/02-journal-club/lesson-01.md
      - Lesson 02 — Leading a Discussion: tracks/02-journal-club/lesson-02.md
      - Lesson 03 — Giving Feedback: tracks/02-journal-club/lesson-03.md
    - Writing Papers: tracks/03-writing/index.md
    - Git & GitHub:
      - Overview: tracks/04-git-github/index.md
      - Lesson 01 — Git Basics: tracks/04-git-github/lesson-01.md
      - Lesson 02 — Branching: tracks/04-git-github/lesson-02.md
      - Lesson 03 — GitHub Collaboration: tracks/04-git-github/lesson-03.md
      - Lesson 04 — Issues and Project Management: tracks/04-git-github/lesson-04.md
      - Lesson 05 — GitHub Actions: tracks/04-git-github/lesson-05.md
    - Coding Practices:
      - Overview: tracks/05-coding/index.md
      - Lesson 01 — IDE Setup: tracks/05-coding/lesson-01.md
      - Lesson 02 — Python & Jupyter: tracks/05-coding/lesson-02.md
      - Lesson 03 — Package Management: tracks/05-coding/lesson-03.md
      - Lesson 04 — Scientific Python Stack: tracks/05-coding/lesson-04.md
      - Lesson 05 — Code Style & Quality: tracks/05-coding/lesson-05.md
      - Lesson 06 — Performance & Parallelism: tracks/05-coding/lesson-06.md
      - Lesson 07 — ML Basics with PyTorch: tracks/05-coding/lesson-07.md
      - Lesson 08 — Project Layout: tracks/05-coding/lesson-08.md
      - Lesson 09 — Documentation: tracks/05-coding/lesson-09.md
      - Lesson 10 — Testing: tracks/05-coding/lesson-10.md
      - Lesson 11 — Packaging: tracks/05-coding/lesson-11.md
      - Lesson 12 — Linting & Automation: tracks/05-coding/lesson-12.md
    - Plotting: tracks/06-plotting/index.md
    - Working with LLMs: tracks/07-llm-practices/index.md
  - Templates:
    - Overview: templates/index.md
    - Journal Club: templates/journal-club.md
    - Paper Outline: templates/paper-outline.md
  - Glossary: glossary.md
  - FAQ: faq.md
  - Community: community.md
  - Credits: credits.md

extra_css:
  - css/custom_rules.css

extra_javascript:
  - js/clipboard.js
  - js/copy_code.js

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            docstring_section_style: list
            filters: ["!^_"]
            heading_level: 1
            merge_init_into_class: true
            separate_signature: true
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
